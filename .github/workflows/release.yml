name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run full plugin validation (remote CPV, --strict)
        # Fetches CPV from GitHub so downstream plugins do not need to
        # vendor a local validator script. Matches publish.py's local
        # gate and the CI validate job. --strict blocks on CRITICAL /
        # MAJOR / MINOR / NIT (exit codes 1-4); WARNING (exit 5+) is
        # advisory only. Issue #11: removed the local validator
        # invocation entirely; always go through the remote uvx entry.
        run: |
          set +e
          uvx --from git+https://github.com/Emasoft/claude-plugins-validation               --with pyyaml               cpv-remote-validate plugin . --strict               > validation-report.txt 2>&1
          exit_code=$?
          set -e
          cat validation-report.txt
          if [ $exit_code -ge 1 ] && [ $exit_code -le 4 ]; then
            echo "::error::Validation failed with exit code $exit_code (CRITICAL/MAJOR/MINOR/NIT found)"
            exit $exit_code
          fi

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            uv run pytest tests/ -v
          fi

      - name: Lint Python scripts
        run: uv run ruff check scripts/

      - name: Type check
        run: uv run mypy scripts/ --ignore-missing-imports

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          fi
          # Prefer the project's CHANGELOG.md (curated, conventional-commits
          # body) over auto-generated git log if it exists. Issue: publish.py's
          # Gate-13 (`gh release create`) is fired locally just before the tag
          # is pushed; that race wins, this job sees the release already
          # exists, and `softprops/action-gh-release@v3` 422s. Falling back to
          # CHANGELOG.md content lets us either fill in the body when the
          # release was just-created (still empty) or skip cleanly when the
          # body is already populated.
          if [ -f "CHANGELOG.md" ]; then
            cp CHANGELOG.md changelog.txt
          else
            echo "$CHANGELOG" > changelog.txt
          fi
          echo "changelog_file=changelog.txt" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release (idempotent)
        # Idempotent shell flow — replaces the `softprops/action-gh-release`
        # action which 422s when publish.py's Gate-13 already created the
        # release locally. Pattern: `gh release view` to detect existence,
        # then `gh release edit` (with --notes-file fallback to existing body)
        # OR `gh release create` (when not pre-existing). Both branches
        # upload the validation-report artifact.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — editing in place"
            gh release edit "$TAG"               --notes-file changelog.txt               --verify-tag
            gh release upload "$TAG" validation-report.txt --clobber
          else
            echo "Release $TAG does not exist yet — creating"
            gh release create "$TAG" validation-report.txt               --title "$TAG"               --notes-file changelog.txt               --verify-tag
          fi

  # Prebuilt memgrep binaries (issue #4): one tarball + sha256 checksum per
  # platform, attached to the release so install-memgrep.sh can download a
  # verified binary without requiring end-users to have a Rust toolchain.
  build-memgrep:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon runner, native build
            platform: darwin-arm64
            target: aarch64-apple-darwin
          # darwin-x64 is CROSS-COMPILED on the arm64 runner: GitHub retired
          # the Intel macos-13 pool (jobs queue forever), and Xcode's clang
          # cross-compiles x86_64 natively, including rusqlite's bundled
          # SQLite C sources.
          - os: macos-14
            platform: darwin-x64
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            platform: linux-x64
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Build into $RUNNER_TEMP (not the checkout's scripts/memgrep/target/):
      # the artifact dir only exists at CI time, so a repo-relative literal
      # path here would dangle for anyone reading the workflow against the
      # tree, and keeping build output outside the checkout avoids polluting
      # later steps that scan the workspace. The --target triple is always
      # explicit (a no-op for the host triple) so the output path is uniform
      # across native and cross builds.
      - name: Build memgrep (release, locked)
        env:
          TARGET: ${{ matrix.target }}
        run: |
          rustup update --no-self-update stable
          rustup default stable
          rustup target add "$TARGET"
          cargo build --release --locked --manifest-path scripts/memgrep/Cargo.toml --target "$TARGET" --target-dir "$RUNNER_TEMP/memgrep-target"

      - name: Package + checksum
        env:
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
        run: |
          set -e
          ASSET="memgrep-${PLATFORM}.tar.gz"
          tar -czf "$ASSET" -C "$RUNNER_TEMP/memgrep-target/$TARGET/release" memgrep
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi
          cat "$ASSET.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          gh release upload "$TAG" "memgrep-${PLATFORM}.tar.gz" "memgrep-${PLATFORM}.tar.gz.sha256" --clobber

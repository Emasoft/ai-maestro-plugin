name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create/edit the GitHub Release + attach assets
      actions: read         # anchore/sbom-action needs this to attach the SBOM as a release asset
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      # Cross-run CPV scan-cache — MUST mirror ci.yml's step verbatim (same
      # action SHA / path / key / restore-keys) so the Release validate step
      # restores the SAME warm ~/.cache/cpv that CI already populated on the
      # release commit. Without it the Release validate ran COLD and timed out
      # at 25 min while CI passed in ~3 min on the identical commit, killing
      # the run before build-memgrep and shipping zero-asset releases
      # (Emasoft/claude-plugins-validation#114). The cache key hashes
      # .cpv-self-hashes.json so a CPV-source change busts it; the same-OS
      # restore-keys fallback still warms the first run after a CPV bump.
      - name: Restore CPV scan-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/cpv
          key: cpv-scan-cache-${{ runner.os }}-${{ hashFiles('**/.cpv-self-hashes.json') }}
          restore-keys: |
            cpv-scan-cache-${{ runner.os }}-

      - name: Run full plugin validation (remote CPV, --strict)
        # Bound the remote uvx CPV fetch so a transient git-fetch stall fails
        # fast (rerunnable) instead of hanging the release — see
        # Emasoft/claude-plugins-validation#90. 25 min (not 12): a COLD CI
        # runner pays for the uvx CPV build PLUS the whole-repo 15-language
        # lint (each linter installed on demand); on this plugin that
        # legitimately exceeds 12 min cold (≈7 s locally with warm caches).
        # 25 min bounds a genuine infinite stall well below the 6-hour default.
        timeout-minutes: 25
        # Fetches CPV from GitHub so downstream plugins do not need to
        # vendor a local validator script. Matches publish.py's local
        # gate and the CI validate job. --strict blocks on CRITICAL /
        # MAJOR / MINOR / NIT (exit codes 1-4); WARNING (exit 5+) is
        # advisory only. Issue #11: removed the local validator
        # invocation entirely; always go through the remote uvx entry.
        run: |
          set +e
          uvx --from git+https://github.com/Emasoft/claude-plugins-validation               --with pyyaml               cpv-remote-validate plugin . --strict               > validation-report.txt 2>&1
          exit_code=$?
          set -e
          cat validation-report.txt
          if [ $exit_code -ge 1 ] && [ $exit_code -le 4 ]; then
            echo "::error::Validation failed with exit code $exit_code (CRITICAL/MAJOR/MINOR/NIT found)"
            exit $exit_code
          fi

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            uv run pytest tests/ -v
          fi

      - name: Lint Python scripts
        run: uv run ruff check scripts/

      - name: Type check
        run: uv run mypy scripts/ --ignore-missing-imports

      - name: Generate changelog
        id: changelog
        # v2.86.0 hardening (issue #22): extract ONLY the matching
        # ``## [X.Y.Z] — YYYY-MM-DD`` block from CHANGELOG.md instead of
        # uploading the entire file. The release body should be the
        # release-specific notes, not the whole project history.
        # Fallback chain:
        #   1. CHANGELOG.md ## [version] section (curated, em-dash separator)
        #   2. CHANGELOG.md ## [version] section (legacy hyphen separator)
        #   3. Full CHANGELOG.md (when no section header matches)
        #   4. Auto-generated git log (when no CHANGELOG.md at all)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          # Strip leading 'v' so v1.2.3 matches ## [1.2.3] — ...
          VERSION="${TAG#v}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            GITLOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            GITLOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD")
          fi
          if [ -f "CHANGELOG.md" ]; then
            # Extract the section header through the next ## or EOF. Try
            # em-dash (canonical) first, then legacy hyphen. awk prints
            # the block bounded by the matching header and the NEXT
            # `## ` at column 0 (or EOF).
            SECTION=$(awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\] [—-] " {found=1; print; next}
              found && /^## / {exit}
              found {print}
            ' CHANGELOG.md)
            if [ -n "$SECTION" ]; then
              printf '%s\n' "$SECTION" > changelog.txt
              echo "::notice::Release body extracted from CHANGELOG.md section for $VERSION"
            else
              echo "::warning::No CHANGELOG.md section matched ## [$VERSION] — falling back to full CHANGELOG.md"
              cp CHANGELOG.md changelog.txt
            fi
          else
            echo "$GITLOG" > changelog.txt
          fi
          echo "changelog_file=changelog.txt" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release (idempotent)
        # Idempotent shell flow — replaces the `softprops/action-gh-release`
        # action which 422s when publish.py's Gate-13 already created the
        # release locally. Pattern: `gh release view` to detect existence,
        # then `gh release edit` (with --notes-file fallback to existing body)
        # OR `gh release create` (when not pre-existing). Both branches
        # upload the validation-report artifact.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — editing in place"
            gh release edit "$TAG"               --notes-file changelog.txt               --verify-tag
            gh release upload "$TAG" validation-report.txt --clobber
          else
            echo "Release $TAG does not exist yet — creating"
            gh release create "$TAG" validation-report.txt               --title "$TAG"               --notes-file changelog.txt               --verify-tag
          fi

      # Software Bill of Materials (provenance-audit MAJOR fix): syft scans the
      # repo and emits a CycloneDX-JSON SBOM, then attaches it to the release
      # this tag-push created above. upload-release-assets defaults true and
      # targets the release for the current tag, so this MUST run AFTER the
      # release exists. The SBOM lists every dependency that went into the
      # shipped artifacts, enabling downstream CVE/license auditing.
      # Third-party action → SHA-pinned (anchore/sbom-action v0.24.0).
      - name: Generate SBOM and attach to release
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: ai-maestro-plugin.cyclonedx.json
          artifact-name: ai-maestro-plugin.cyclonedx.json
          upload-release-assets: true

  # Prebuilt memgrep binaries (issue #4): one tarball + sha256 checksum per
  # platform, attached to the release so install-memgrep.sh can download a
  # verified binary without requiring end-users to have a Rust toolchain.
  build-memgrep:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon runner, native build
            platform: darwin-arm64
            target: aarch64-apple-darwin
          # darwin-x64 is CROSS-COMPILED on the arm64 runner: GitHub retired
          # the Intel macos-13 pool (jobs queue forever), and Xcode's clang
          # cross-compiles x86_64 natively, including rusqlite's bundled
          # SQLite C sources.
          - os: macos-14
            platform: darwin-x64
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            platform: linux-x64
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write       # upload the memgrep tarball + sha256 to the release
      id-token: write       # attest-build-provenance: mint the OIDC token for the signed attestation
      attestations: write   # attest-build-provenance: persist the build-provenance attestation
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Build into $RUNNER_TEMP (not the checkout's scripts/memgrep/target/):
      # the artifact dir only exists at CI time, so a repo-relative literal
      # path here would dangle for anyone reading the workflow against the
      # tree, and keeping build output outside the checkout avoids polluting
      # later steps that scan the workspace. The --target triple is always
      # explicit (a no-op for the host triple) so the output path is uniform
      # across native and cross builds.
      - name: Build memgrep (release, locked)
        env:
          TARGET: ${{ matrix.target }}
        run: |
          rustup update --no-self-update stable
          rustup default stable
          rustup target add "$TARGET"
          cargo build --release --locked --manifest-path scripts/memgrep/Cargo.toml --target "$TARGET" --target-dir "$RUNNER_TEMP/memgrep-target"

      - name: Package + checksum
        env:
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
        run: |
          set -e
          ASSET="memgrep-${PLATFORM}.tar.gz"
          tar -czf "$ASSET" -C "$RUNNER_TEMP/memgrep-target/$TARGET/release" memgrep
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi
          cat "$ASSET.sha256"

      # Build-provenance attestation (provenance-audit MAJOR fix): cryptographically
      # attest the memgrep tarball this matrix leg just built, so consumers can run
      # `gh attestation verify memgrep-<platform>.tar.gz --repo Emasoft/ai-maestro-plugin`
      # to prove it was built by THIS workflow on THIS commit (SLSA provenance).
      # subject-path is a glob matching the single per-leg tarball in the workspace
      # root (where Package+checksum wrote it). First-party actions/ action → pinned
      # to the major tag v4 (kept current by Dependabot). Requires id-token: write +
      # attestations: write (set at job level above). Runs on both macOS and Linux.
      - name: Attest build provenance for memgrep binary
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'memgrep-${{ matrix.platform }}.tar.gz'

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          gh release upload "$TAG" "memgrep-${PLATFORM}.tar.gz" "memgrep-${PLATFORM}.tar.gz.sha256" --clobber
